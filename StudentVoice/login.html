<!DOCTYPE html>
<html>

<head>
    <title>TINIG | Admin Login</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <h1>TINIG</h1>

        <p class="tagline">
            Admin Login
        </p>

    </header>


    <form id="loginForm">

        <h2>Authorized Access Only</h2>


        <label for="email">
            Email:
        </label>

        <input
            type="email"
            id="email"
            placeholder="Enter admin email"
            required
        >


        <label for="password">
            Password:
        </label>

        <input
            type="password"
            id="password"
            placeholder="Enter password"
            required
        >


        <button type="submit">
            Login
        </button>

    </form>


    <script
        type="module"
        src="login.js">
    </script>

</body>

</html>
